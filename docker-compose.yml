services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-otranslate}
      POSTGRES_USER: ${POSTGRES_USER:-otranslate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-otranslate_dev_password}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: node:22
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URI: postgres://otranslate:otranslate_dev_password@postgres:5432/otranslate
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NODE_ENV: development
      PAYLOAD_CONFIG_PATH: src/payload/payload.config.ts
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-dev-only-change-me}
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - pnpm-store:/root/.local/share/pnpm/store

volumes:
  postgres-data:
  pnpm-store:
