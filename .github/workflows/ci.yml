name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Lint · Typecheck · Format
  # ──────────────────────────────────────────────────────────────────────────
  lint-typecheck-format:
    name: Lint · Typecheck · Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Lint (ESLint via Reviewdog)
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          eslint_flags: '.'
          fail_on_error: true

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Format check
        run: pnpm exec prettier --check .

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Security
  # ──────────────────────────────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SAST (Semgrep)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/default
            p/security-audit
            p/typescript

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3: PR Conventions (Danger.js)
  # ──────────────────────────────────────────────────────────────────────────
  conventions:
    name: PR Conventions (Danger.js)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Run Danger.js
        run: npx danger ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4: Content Validation
  # ──────────────────────────────────────────────────────────────────────────
  content-validation:
    name: Content Validation
    runs-on: ubuntu-latest
    container: abdullahakim/otranslate-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Validate seed content
        run: pnpm validate:content

      - name: Content validator tests
        run: pnpm exec vitest run scripts/__tests__/validate-content.test.ts

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 5: Lighthouse CI
  # ──────────────────────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    container: abdullahakim/otranslate-platform
    env:
      DATABASE_URI: postgres://postgres:postgres@localhost:5432/postgres
      PAYLOAD_SECRET: ci-lighthouse-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Run Lighthouse CI
        run: pnpm lhci
